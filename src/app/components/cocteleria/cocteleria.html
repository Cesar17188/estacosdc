<section class="container">

      <div class="section-header">
        <span class="section-subtitle">Mixología de Altura</span>
        <h2>Coctelería de Autor</h2>
      </div>

      <div class="blog-grid">
        @for (post of cocktailPosts; track post.id) {

          <!-- En la app real, el href será [routerLink]="['/cocteleria', post.id]" -->
          <a href="#/cocteleria/{{ post.id }}" class="blog-card">

            <div class="card-image-wrapper">
              <span class="card-tag">{{ post.baseSpirit }}</span>
              <img [src]="post.imageUrl" [alt]="post.title" class="card-image" loading="lazy">
            </div>

            <div class="card-content">
              <div class="card-meta">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>{{ post.readTime }} lectura</span>
              </div>

              <h3 class="card-title">{{ post.title }}</h3>
              <p class="card-excerpt">{{ post.excerpt }}</p>

              <div class="read-more">
                Ver Receta
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                </svg>
              </div>
            </div>

          </a>

        }
      </div>

    </section>
