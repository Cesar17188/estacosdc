<div class="container">
      <div class="section-header">
        <span class="section-subtitle">Momentos Inmortales</span>
        <h2>Galería Estancos</h2>
      </div>

      <!-- ESTADO DE CARGA -->
      @if (isLoading()) {
        <div class="loader-container">
          <div class="spinner"></div>
          <div class="loader-text">Revelando Imágenes...</div>
        </div>
      } @else {
        <!-- GRID DE IMÁGENES -->
        <div class="gallery-grid">
          @for (img of images(); track img.url) {
            <div class="gallery-item" [class]="img.sizeClass" (click)="openLightbox(img)">
              <img [src]="img.url" [alt]="img.alt" loading="lazy">
              <div class="overlay">
                <h3>{{ img.title }}</h3>
              </div>
            </div>
          }
        </div>
      }
    </div>

    <!-- LIGHTBOX MODAL -->
    <div class="lightbox-overlay" [class.active]="selectedImage() !== null" (click)="closeLightbox($event)">
      @if (selectedImage()) {
        <div class="lightbox-content" (click)="$event.stopPropagation()">
          <button class="lightbox-close" (click)="closeLightbox($event)" aria-label="Cerrar visor">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <img [src]="selectedImage()?.url" [alt]="selectedImage()?.alt" class="lightbox-img">
          <h3 class="lightbox-caption">{{ selectedImage()?.title }}</h3>
        </div>
      }
    </div>
