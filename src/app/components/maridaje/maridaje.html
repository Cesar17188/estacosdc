<section class="container">

      <div class="section-header">
        <span class="section-subtitle">Armonía de Sabores</span>
        <h2>El Maridaje Perfecto</h2>
      </div>

      <!-- Iteramos por cada destilado (Ron, Whisky) -->
      @for (category of pairings; track category.spiritName) {
        <div class="pairing-category">

          <div class="category-header">
            <h3>{{ category.spiritName }}</h3>
            <p>{{ category.spiritSubtitle }}</p>
          </div>

          <div class="pairing-grid">
            <!-- Iteramos por las combinaciones ideales para ese destilado -->
            @for (item of category.items; track item.name) {
              <div class="pairing-card">

                <div class="card-image-wrapper">
                  <img [src]="item.imageUrl" [alt]="item.name" class="card-image" loading="lazy">
                  <div class="plus-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                  </div>
                </div>

                <div class="card-content">
                  <h4 class="card-title">{{ item.name }}</h4>
                  <p class="card-description">{{ item.description }}</p>
                </div>

              </div>
            }
          </div>

        </div>
      }

    </section>
