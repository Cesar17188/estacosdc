<section class="section-padding awards-section">
      <div class="container">

        <div class="section-header">
          <span class="section-subtitle">Reconocimiento a la Excelencia</span>
          <h2>Galardones de la Destilería</h2>
        </div>

        <div class="awards-container">

          <!-- Loop para iterar entre los productos que tienen premios -->
          @for (product of productsAwards; track product.productName) {
            <div class="product-awards-section">

              <div class="product-header">
                <img [src]="product.imageUrl" [alt]="product.productName" class="product-avatar">
                <h3 class="product-title">{{ product.productName }}</h3>
              </div>

              <div class="awards-list">
                <!-- Loop para iterar los premios de cada producto -->
                @for (award of product.awards; track award.title) {
                  <div class="award-item">
                    <div class="award-icon">
                      <!-- Ícono SVG de Medalla -->
                      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                      </svg>
                    </div>
                    <div class="award-info">
                      <span class="award-year">{{ award.year }}</span>
                      <h4 class="award-title">{{ award.title }}</h4>
                      <p class="award-competition">{{ award.competition }}</p>
                    </div>
                  </div>
                }
              </div>

            </div>
          }

        </div>
      </div>
    </section>
