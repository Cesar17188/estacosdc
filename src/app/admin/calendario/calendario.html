<main class="crm-main">
  <div class="crm-content-scroll">
    <div class="page-header">
      <div>
        <h1 class="page-title">Calendario de Operaciones</h1>
        <p class="page-subtitle">Gestiona eventos internos y sincronización con "Estancos-operaciones".</p>
      </div>
    </div>

    <div class="calendar-container data-panel">
      <full-calendar [options]="calendarOptions()"></full-calendar>
    </div>
  </div>
</main>

<!-- PANEL LATERAL (SLIDE OVER) PARA CREAR/EDITAR EVENTOS -->
<div class="slide-overlay" [class.open]="isPanelOpen()" (click)="closePanel()">
  <div class="slide-panel" (click)="$event.stopPropagation()">
    
    <div class="slide-header">
      <div>
        <h2>{{ panelMode() === 'create' ? 'Nuevo Evento' : 'Detalles del Evento' }}</h2>
        <p>Google Calendar: Estancos-operaciones</p>
      </div>
      <button class="btn-close" (click)="closePanel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div class="slide-body">
      <div class="form-group mb-3">
        <label for="eventCategory" class="info-label">Categoría del Evento</label>
        <select 
          id="eventCategory"
          class="crm-input"
          style="width: 100%; margin-bottom: 1rem;"
          [(ngModel)]="eventForm().category">
          <option value="" disabled>Selecciona una categoría</option>
          <option *ngFor="let cat of eventCategories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group mb-3">
        <label for="eventTitle" class="info-label">Título del Evento</label>
        <input 
          id="eventTitle" 
          type="text" 
          class="crm-input" 
          style="width: 100%; margin-bottom: 1rem;"
          placeholder="Ej: Producción de Ron Batch #4"
          [(ngModel)]="eventForm().title">
      </div>

      <div class="form-group mb-3">
        <label for="eventAttendees" class="info-label">Participantes (Correos, separados por coma)</label>
        <input 
          id="eventAttendees" 
          type="text" 
          class="crm-input" 
          style="width: 100%; margin-bottom: 1rem;"
          placeholder="Ej: admin@estancos.com, juan@estancos.com"
          [(ngModel)]="eventForm().attendees">
      </div>

      <div class="form-group mb-3" style="margin-bottom: 1rem;">
        <label class="info-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
          <input type="checkbox" [(ngModel)]="eventForm().allDay" (ngModelChange)="onAllDayChange($event)">
          Todo el día
        </label>
      </div>

      <div class="form-group mb-3" style="margin-bottom: 1rem;">
        <label for="eventStart" class="info-label">Inicio</label>
        <input 
          id="eventStart" 
          [type]="eventForm().allDay ? 'date' : 'datetime-local'"
          class="crm-input" 
          style="width: 100%;"
          [(ngModel)]="eventForm().start">
      </div>

      <div class="form-group mb-3" style="margin-bottom: 1rem;">
        <label for="eventEnd" class="info-label">Fin</label>
        <input 
          id="eventEnd" 
          [type]="eventForm().allDay ? 'date' : 'datetime-local'"
          class="crm-input" 
          style="width: 100%;"
          [(ngModel)]="eventForm().end">
      </div>
    </div>

    <div class="slide-footer" style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn-outline" (click)="closePanel()">Cancelar</button>
      
      <button *ngIf="panelMode() === 'create'" class="btn-primary" (click)="saveEvent()">
        Guardar Evento
      </button>

      <button *ngIf="panelMode() === 'edit'" class="btn-danger" (click)="askDeleteConfirmation()" style="background: #e74c3c; border-color: #e74c3c; color: white;">
        Eliminar
      </button>

      <button *ngIf="panelMode() === 'edit'" class="btn-primary" (click)="saveEvent()">
        Guardar Cambios
      </button>
    </div>

  </div>
</div>

<!-- MODAL DE CONFIRMACIÓN -->
<div class="modal-overlay" *ngIf="isConfirmOpen()" (click)="closeConfirm()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3 style="color: var(--color-text-main); margin-bottom: 1rem;">Confirmar Acción</h3>
    <p style="color: var(--crm-text-muted); margin-bottom: 2rem;">{{ confirmMessage() }}</p>
    
    <div style="display: flex; justify-content: flex-end; gap: 1rem;">
      <button class="btn-outline" (click)="closeConfirm()">Cancelar</button>
      <button class="btn-danger" style="background: #e74c3c; border-color: #e74c3c; color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;" (click)="confirmDelete()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- TOASTS DE MENSAJES -->
<app-dialog [message]="dialogMessage()" [type]="dialogType()" (closeDialog)="closeDialog()"></app-dialog>
